<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Jokempô</title>
</head>
<body>

    <main class="container">


    <div class="results">
            <div>
                <span class="user-results">
                    <img src="img/./pedra.png" alt="Escolha do usuario">
                </span>

                <span class="computer-results">
                    <img src="img/./pedra.png" alt="Escolha do computador">
                </span>
            </div>
                <p class="result-text">Bora jogar?</p>
            </div>

    <div class="options">

                 <span class="option-image">
                    <img src="img/./pedra.png" alt="Imagem Pedra">
                    <p>Pedra</p>
                </span>

                 <span class="option-image">
                    <img src="img/./papel.png" alt="Imagem Papel">
                    <p>Papel</p>
                </span>

                 <span class="option-image">
                    <img src="img/./tesoura.png" alt="Imagem Tesoura">
                    <p>Tesoura</p>
                </span>
    </div>
    </main>
    
<script src="script.js"></script>
</body>
</html>
